<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Toán Tỷ Giá USD - VND</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .rate-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
        }
        .rate-info p {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #555;
        }
        .radio-label input {
            width: auto;
        }
        .convert-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .convert-btn:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f0fff4;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h3 {
            color: #2d8f3f;
            margin-bottom: 10px;
        }
        .result .value {
            font-size: 32px;
            font-weight: bold;
            color: #2d8f3f;
        }
        .result .unit {
            font-size: 18px;
            color: #666;
        }
        .error {
            margin-top: 25px;
            padding: 15px;
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 10px;
            color: #c53030;
            text-align: center;
            display: none;
        }
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💱 Tính Toán Tỷ Giá USD - VND</h1>
        
        <div class="rate-info">
            <p>80,000 VND = 10 USD</p>
        </div>
        
        <div class="input-group">
            <label>Chọn đơn vị:</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="unit" value="vnd" checked>
                    VND
                </label>
                <label class="radio-label">
                    <input type="radio" name="unit" value="usd">
                    USD
                </label>
            </div>
        </div>
        
        <div class="input-group">
            <label for="input-value">Nhập số:</label>
            <input type="number" id="input-value" placeholder="Nhập số..." step="any">
        </div>
        
        <button class="convert-btn" onclick="convert()">Tính Toán</button>
        
        <div class="result" id="result">
            <h3>Kết quả:</h3>
            <div class="value" id="result-value"></div>
            <div class="unit" id="result-unit"></div>
        </div>
        
        <div class="error" id="error">
            Vui lòng nhập số hợp lệ!
        </div>
    </div>

    <script>
        function convert() {
            const inputValue = document.getElementById('input-value').value;
            const unit = document.querySelector('input[name="unit"]:checked').value;
            const resultDiv = document.getElementById('result');
            const resultValue = document.getElementById('result-value');
            const resultUnit = document.getElementById('result-unit');
            const errorDiv = document.getElementById('error');
            
            // Tỉ lệ: 80,000 VND = 10 USD → 8,000 VND/USD
            const rate = 8000;
            
            // Xóa kết quả cũ
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');
            
            // Kiểm tra input
            if (inputValue === '' || isNaN(inputValue) || parseFloat(inputValue) < 0) {
                errorDiv.classList.add('show');
                return;
            }
            
            let result;
            if (unit === 'vnd') {
                // Chuyển từ VND sang USD
                result = parseFloat(inputValue) / rate;
                resultValue.textContent = result.toFixed(2);
                resultUnit.textContent = 'USD';
            } else {
                // Chuyển từ USD sang VND
                result = parseFloat(inputValue) * rate;
                resultValue.textContent = result.toLocaleString('vi-VN');
                resultUnit.textContent = 'VND';
            }
            
            resultDiv.classList.add('show');
        }
        
        // Cho phép tính bằng Enter
        document.getElementById('input-value').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                convert();
            }
        });
    </script>
</body>
</html>
